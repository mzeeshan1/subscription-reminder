apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: subman-ingress
  namespace: subman
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: subman.yourdomain.com # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: subman
                port:
                  number: 80
  # tls:
  #   - hosts:
  #       - subman.yourdomain.com
  #     secretName: subman-tls
