# Fill in your real values before applying.
# stringData is plain text — Kubernetes base64-encodes it automatically.
apiVersion: v1
kind: Secret
metadata:
  name: subman-secret
  namespace: subman
type: Opaque
stringData:
  POSTGRES_PASSWORD: "postgres"
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/subman?sslmode=disable"
  JWT_SECRET: "change-me-in-production"
  TELEGRAM_BOT_TOKEN: ""
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
