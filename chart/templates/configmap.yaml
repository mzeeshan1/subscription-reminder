apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "subman.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "subman.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  REDIS_URL: {{ printf "redis://%s:6379" (include "subman.redisHost" .) | quote }}
  TWILIO_FROM_NUMBER: {{ .Values.config.twilioFromNumber | quote }}
