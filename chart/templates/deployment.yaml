apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "subman.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "subman.labels" . | nindent 4 }}
spec:
  # Keep at 1 — the reminder worker runs inside this process.
  # Scale only after extracting the worker into a separate CronJob.
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "subman.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "subman.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "subman.fullname" . }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "subman.fullname" . }}-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "subman.fullname" . }}-secret
                  key: JWT_SECRET
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "subman.fullname" . }}-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: {{ include "subman.fullname" . }}-secret
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "subman.fullname" . }}-secret
                  key: TWILIO_AUTH_TOKEN
          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "subman.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "subman.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "subman.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 8080
