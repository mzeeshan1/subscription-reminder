{{define "head"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SubMan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800">
{{end}}

{{define "nav"}}
<nav class="bg-white shadow-sm border-b border-gray-200">
  <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
    <a href="/" class="text-xl font-bold text-indigo-600 tracking-tight">SubMan</a>
    <div class="flex items-center gap-6 text-sm">
      <a href="/" class="text-gray-600 hover:text-indigo-600 font-medium">Dashboard</a>
      <a href="/settings" class="text-gray-600 hover:text-indigo-600 font-medium">Settings</a>
      <span class="text-gray-400">{{.Email}}</span>
      <form method="POST" action="/logout">
        <button type="submit" class="text-red-500 hover:text-red-700 font-medium">Logout</button>
      </form>
    </div>
  </div>
</nav>
{{end}}

{{define "foot"}}
</body>
</html>
{{end}}
