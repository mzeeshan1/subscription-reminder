{{define "register.html"}}
{{template "head" .}}
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-indigo-600 mb-1">SubMan</h1>
    <p class="text-gray-500 text-sm mb-6">Create your account</p>

    {{if .Error}}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-5">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/register" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" value="{{.Email}}" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password <span class="text-gray-400 font-normal">(min 8 characters)</span></label>
        <input type="password" name="password" required minlength="8"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-lg hover:bg-indigo-700 transition text-sm">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-5">
      Already have an account? <a href="/login" class="text-indigo-600 hover:underline font-medium">Sign in</a>
    </p>
  </div>
</div>
{{template "foot" .}}
{{end}}
